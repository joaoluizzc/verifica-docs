spring.datasource.url=jdbc:h2:mem:verificadocs;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.open-in-view=false

ocr.space.enabled=${OCR_SPACE_ENABLED:true}
ocr.space.api-key=${OCR_SPACE_API_KEY:helloworld}
app.upload.dir=uploads-local
