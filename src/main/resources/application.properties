spring.application.name=VerificaDocs

server.port=${SERVER_PORT:8080}

spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/verificadocs}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true

spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=12MB

app.upload.dir=${UPLOAD_DIR:uploads}

ocr.space.enabled=${OCR_SPACE_ENABLED:true}
ocr.space.api-url=${OCR_SPACE_API_URL:https://api.ocr.space/parse/image}
ocr.space.api-key=${OCR_SPACE_API_KEY:helloworld}
